workflows:
  android-workflow:
    name: AbuLearn Android APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: latest
    triggering:
      events:
        - push
    scripts:
      - name: Install dependencies
        script: | 
          npm install --legacy-peer-deps
      - name: Build Android APK
        script: | 
          ANDROID_DIR=$(find . -name "gradlew" -exec dirname {} \;)
          if [ -z "$ANDROID_DIR" ]; then
            echo "Gradle folder not found. Running pre-build..."
            npx react-native android || npx expo prebuild
            ANDROID_DIR=$(find . -name "gradlew" -exec dirname {} \;)
          fi
          cd "$ANDROID_DIR"
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/**/*.apk
