workflows:
  android-workflow:
    name: AbuLearn Android APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: 20.11.0
    triggering:
      events:
        - push
    scripts:
      - name: Install dependencies
        script: | 
          npm install --legacy-peer-deps
          npm install ajv ajv-keywords --legacy-peer-deps
          npm install --save-dev @react-native-community/cli --legacy-peer-deps
      - name: Build Android APK
        script: | 
          # Force generate the main android folder if it's completely missing
          if [ ! -d "android" ]; then
            echo "Main Android directory missing. Generating..."
            npx expo prebuild --platform android --clean || npx react-native run-android --no-packager
          fi
          
          # Navigate into the verified main android directory and build production release
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
