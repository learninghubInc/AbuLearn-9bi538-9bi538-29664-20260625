workflows:
  android-workflow:
    name: AbuLearn Android APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: latest
    triggering:
      events:
        - push
    scripts:
      - name: Install dependencies
        script: | 
          npm install --legacy-peer-deps
      - name: Build Android APK
        script: | 
          # Force generate the main android folder if it's completely missing
          if [ ! -d "android" ]; then
            echo "Main Android directory missing. Generating..."
            npx expo prebuild --platform android || npx react-native eject || npx react-native android
          fi
          
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/**/*.apk
